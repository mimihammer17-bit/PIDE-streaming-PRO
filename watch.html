<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vidéo — PIDE Stream</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24" fill="white"><polygon points="9,6 20,12 9,18"/></svg></div>
    <span class="logo-name">PIDE<span>stream</span></span>
  </a>
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Rechercher"/>
    <button class="search-btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg></button>
  </div>
  <div class="nav-right">
    <button class="btn-login" id="btnLogin" onclick="loginGoogle()">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Se connecter
    </button>
    <a href="upload.html" class="btn-upload hidden" id="btnUpload">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    </a>
    <div class="avatar-wrap hidden" id="avatarWrap">
      <img src="" class="avatar" id="userAvatar" onclick="toggleMenu()"/>
      <div class="dropdown hidden" id="dropdown">
        <div class="dropdown-head"><img src="" id="ddAvatar"/><div><div class="dropdown-head-name" id="ddName"></div><div class="dropdown-head-email" id="ddEmail"></div></div></div>
        <a href="dashboard.html" class="dropdown-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Tableau de bord</a>
        <a href="#" class="dropdown-item" id="ddChannel"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Ma chaîne</a>
        <button class="dropdown-item red" onclick="logoutUser()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Se déconnecter</button>
      </div>
    </div>
  </div>
</nav>

<aside class="sidebar">
  <a href="../index.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Accueil</a>
  <a href="../index.html?cat=tendances" class="sidebar-item"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Tendances</a>
  <a href="../index.html?cat=film" class="sidebar-item"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>Films</a>
</aside>

<div class="watch-wrap">
  <!-- Colonne principale -->
  <div>
    <!-- Paywall -->
    <div class="paywall-box hidden" id="paywallBox">
      <div class="paywall-inner">
        <div style="font-size:48px;margin-bottom:12px">🔒</div>
        <h2 id="paywallTitle" style="font-size:18px;font-weight:500;margin-bottom:4px"></h2>
        <div class="paywall-price" id="paywallPrice"></div>
        <p style="color:#aaa;margin-bottom:20px;font-size:14px">Achetez l'accès pour regarder ce contenu</p>
        <button class="btn-red" onclick="buyVideo()">💳 Acheter maintenant</button>
        <p style="color:#717171;font-size:12px;margin-top:10px">Paiement Stripe — bientôt disponible</p>
      </div>
    </div>

    <!-- Player -->
    <div class="player-box hidden" id="playerBox">
      <video id="player" controls playsinline preload="metadata"></video>
    </div>

    <!-- Infos vidéo -->
    <div id="videoInfo" style="display:none">
      <h1 class="video-title-big" id="vTitle"></h1>

      <div class="video-meta-bar">
        <div class="channel-info">
          <img src="" id="chanAvatar"/>
          <div>
            <a href="#" id="chanLink" class="channel-info-name"></a>
            <div class="channel-info-subs" id="chanSubs"></div>
          </div>
          <button class="btn-subscribe" id="btnSub" onclick="toggleSub()">S'abonner</button>
        </div>
        <div class="action-btns">
          <button class="action-btn" id="btnLike" onclick="toggleLike()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
            <span id="likeCount">0</span>
          </button>
          <div class="action-btn" style="cursor:default">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <span id="viewCount">0</span>
          </div>
        </div>
      </div>

      <div class="description-box" id="vDesc"></div>

      <!-- Commentaires -->
      <div class="comments-title" id="commTitle" style="display:none">Commentaires</div>
      <div class="comment-form hidden" id="commentForm">
        <img src="" id="commentAvatar"/>
        <div style="flex:1">
          <textarea class="form-textarea" id="commentInput" placeholder="Ajouter un commentaire..." rows="2"></textarea>
          <button class="btn-red" style="margin-top:8px;padding:8px 18px;font-size:13px" onclick="postComment()">Publier</button>
        </div>
      </div>
      <div id="commentsList" style="margin-top:16px"></div>
    </div>
  </div>

  <!-- Sidebar suggestions -->
  <div class="watch-sidebar">
    <div style="font-size:15px;font-weight:500;margin-bottom:14px">À regarder ensuite</div>
    <div id="suggested"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, increment, collection, addDoc, getDocs, query, orderBy, limit, setDoc, deleteDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyBmVFW68wgt6x0AsAKxhi8mXsuwFVEErZ0",authDomain:"pide-streaming.firebaseapp.com",projectId:"pide-streaming",storageBucket:"pide-streaming.firebasestorage.app",messagingSenderId:"659902528117",appId:"1:659902528117:web:77eb7419642a108379963c"};
const app=initializeApp(cfg); const auth=getAuth(app); const db=getFirestore(app); const prov=new GoogleAuthProvider();
const vid=new URLSearchParams(location.search).get('id');
let me=null,vdata=null,liked=false,subbed=false;

onAuthStateChanged(auth,async u=>{
  me=u;
  if(u){
    document.getElementById('btnLogin').classList.add('hidden');
    document.getElementById('btnUpload').classList.remove('hidden');
    document.getElementById('avatarWrap').classList.remove('hidden');
    ['userAvatar','ddAvatar','commentAvatar'].forEach(id=>document.getElementById(id).src=u.photoURL);
    document.getElementById('ddName').textContent=u.displayName;
    document.getElementById('ddEmail').textContent=u.email;
    document.getElementById('ddChannel').href=`channel.html?uid=${u.uid}`;
    document.getElementById('commentForm').classList.remove('hidden');
    document.getElementById('commTitle').style.display='block';
    loadComments(); checkLike(); checkSub();
  }
  if(vid) loadVideo();
});

async function loadVideo(){
  const snap=await getDoc(doc(db,'videos',vid));
  if(!snap.exists()){document.getElementById('vTitle').textContent='Introuvable';return;}
  vdata={id:snap.id,...snap.data()};
  await updateDoc(doc(db,'videos',vid),{views:increment(1)});
  document.title=`${vdata.title} — PIDE Stream`;
  document.getElementById('vTitle').textContent=vdata.title;
  document.getElementById('viewCount').textContent=(vdata.views||0)+1;
  document.getElementById('likeCount').textContent=vdata.likes||0;
  document.getElementById('vDesc').textContent=vdata.description||'';
  document.getElementById('videoInfo').style.display='block';

  if(vdata.channelId){
    const us=await getDoc(doc(db,'users',vdata.channelId));
    if(us.exists()){
      const u=us.data();
      document.getElementById('chanAvatar').src=u.photoURL||'';
      document.getElementById('chanLink').textContent=u.displayName||u.channelName;
      document.getElementById('chanLink').href=`channel.html?uid=${vdata.channelId}`;
      document.getElementById('chanSubs').textContent=`${u.subscribers||0} abonnés`;
    }
  }

  if(vdata.isPaid){
    const paid=me?await checkPurchase():false;
    if(!paid){
      document.getElementById('paywallBox').classList.remove('hidden');
      document.getElementById('paywallTitle').textContent=vdata.title;
      document.getElementById('paywallPrice').textContent=`${vdata.price} €`;
      return;
    }
  }
  document.getElementById('playerBox').classList.remove('hidden');
  document.getElementById('player').src=vdata.videoUrl;
  loadSuggested();
}

async function checkPurchase(){ if(!me) return false; const s=await getDoc(doc(db,'purchases',`${me.uid}_${vid}`)); return s.exists(); }
async function checkLike(){ if(!me||!vid) return; const s=await getDoc(doc(db,'likes',`${me.uid}_${vid}`)); liked=s.exists(); document.getElementById('btnLike').classList.toggle('liked',liked); }
async function checkSub(){ if(!me||!vdata?.channelId) return; const s=await getDoc(doc(db,'subscriptions',`${me.uid}_${vdata.channelId}`)); subbed=s.exists(); const b=document.getElementById('btnSub'); b.textContent=subbed?'✓ Abonné':"S'abonner"; b.classList.toggle('subscribed',subbed); }

window.toggleLike=async()=>{
  if(!me){alert('Connectez-vous pour liker !');return;}
  const lr=doc(db,'likes',`${me.uid}_${vid}`),vr=doc(db,'videos',vid);
  if(liked){await deleteDoc(lr);await updateDoc(vr,{likes:increment(-1)});liked=false;document.getElementById('likeCount').textContent=parseInt(document.getElementById('likeCount').textContent)-1;}
  else{await setDoc(lr,{userId:me.uid,videoId:vid,createdAt:serverTimestamp()});await updateDoc(vr,{likes:increment(1)});liked=true;document.getElementById('likeCount').textContent=parseInt(document.getElementById('likeCount').textContent)+1;}
  document.getElementById('btnLike').classList.toggle('liked',liked);
};

window.toggleSub=async()=>{
  if(!me){alert('Connectez-vous !');return;}
  if(!vdata?.channelId)return;
  const sr=doc(db,'subscriptions',`${me.uid}_${vdata.channelId}`),cr=doc(db,'users',vdata.channelId);
  if(subbed){await deleteDoc(sr);await updateDoc(cr,{subscribers:increment(-1)});subbed=false;}
  else{await setDoc(sr,{userId:me.uid,channelId:vdata.channelId,createdAt:serverTimestamp()});await updateDoc(cr,{subscribers:increment(1)});subbed=true;}
  const b=document.getElementById('btnSub'); b.textContent=subbed?'✓ Abonné':"S'abonner"; b.classList.toggle('subscribed',subbed);
};

window.postComment=async()=>{
  if(!me)return;
  const t=document.getElementById('commentInput').value.trim();
  if(!t)return;
  await addDoc(collection(db,'videos',vid,'comments'),{text:t,userId:me.uid,userName:me.displayName,userPhoto:me.photoURL,createdAt:serverTimestamp()});
  document.getElementById('commentInput').value='';
  loadComments();
};

async function loadComments(){
  const q=query(collection(db,'videos',vid,'comments'),orderBy('createdAt','desc'),limit(50));
  const snap=await getDocs(q);
  const list=document.getElementById('commentsList');
  if(snap.empty){list.innerHTML='<p style="color:#717171;font-size:14px">Aucun commentaire.</p>';return;}
  list.innerHTML=snap.docs.map(d=>{const c=d.data();return`<div class="comment-item"><img src="${c.userPhoto||''}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0"/><div><div class="comment-author">${c.userName}</div><div class="comment-body">${c.text}</div></div></div>`;}).join('');
}

async function loadSuggested(){
  const q=query(collection(db,'videos'),orderBy('views','desc'),limit(10));
  const snap=await getDocs(q);
  const c=document.getElementById('suggested');
  c.innerHTML=snap.docs.filter(d=>d.id!==vid).slice(0,7).map(d=>{const v={id:d.id,...d.data()};return`<a href="watch.html?id=${v.id}" class="suggest-card"><div class="suggest-thumb">${v.thumbnail?`<img src="${v.thumbnail}"/>`:'<div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:22px">🎬</div>'}</div><div class="suggest-info"><div class="suggest-title">${v.title}</div><div class="suggest-meta">${v.channelName||''}</div><div class="suggest-meta">${v.views||0} vues</div></div></a>`;}).join('');
}

window.buyVideo=()=>alert('Paiement Stripe — bientôt disponible !');
window.loginGoogle=async()=>{try{await signInWithPopup(auth,prov);}catch(e){}};
window.logoutUser=async()=>{await signOut(auth);};
window.toggleMenu=()=>{document.getElementById('dropdown').classList.toggle('hidden');};
document.addEventListener('click',e=>{const w=document.getElementById('avatarWrap');if(w&&!w.contains(e.target))document.getElementById('dropdown')?.classList.add('hidden');});
</script>
</body>
</html>
